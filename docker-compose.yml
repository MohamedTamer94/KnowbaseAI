version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16
    container_name: knowbaseai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - knowbaseai-network

  # Chroma Vector Database Service
  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: knowbaseai-chroma
    volumes:
      - chroma-data:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - knowbaseai-network
    restart: unless-stopped

  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowbaseai-backend
    ports:
      - "8000:8000"
    environment:
      # Groq LLM Configuration
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_LLM_MODEL: ${GROQ_LLM_MODEL:-llama-3.3-70b-versatile}

      # Chroma Vector Database
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000

      # Embedding Model
      SENTENCE_TRANSFORMER_MODEL: ${SENTENCE_TRANSFORMER_MODEL:-all-MiniLM-L6-v2}

      # Frontend URL (for CORS) - Update to your Vercel deployment
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}

      # JWT Secret
      JWT_SECRET: ${JWT_SECRET}
      
      # Python Settings
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1

    volumes:
      # Persist uploaded documents
      - knowbaseai-uploads:/app/backend/uploaded_files

    depends_on:
      chroma:
        condition: service_healthy
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    networks:
      - knowbaseai-network

    restart: unless-stopped

  # Optional: Nginx Reverse Proxy (uncomment to enable)
  # nginx:
  #   image: nginx:alpine
  #   container_name: knowbaseai-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - knowbaseai-network
  #   restart: unless-stopped

networks:
  knowbaseai-network:
    driver: bridge

volumes:
  chroma-data:
  postgres-data:
  knowbaseai-uploads:
